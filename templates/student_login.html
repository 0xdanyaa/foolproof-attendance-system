{% extends "base.html" %}
{% block title %}Student Login{% endblock %}

{% block content %}
<div class="login-wrapper">
    <div class="login-card fade-in">

        <div class="login-logo">🎓</div>

        <h1 class="login-title">Student Login</h1>
        <p class="login-subtitle">View your attendance records and progress</p>

        <form method="POST" action="{{ url_for('student_login') }}" id="student-login-form">

            <div class="mb-3">
                <label for="username" class="form-label">Username</label>
                <div class="input-group">
                    <span class="input-group-text"
                        style="background:rgba(255,255,255,0.05);border-color:rgba(255,255,255,0.08);color:#94a3b8;">
                        <i class="bi bi-person"></i>
                    </span>
                    <input type="text" class="form-control" id="username" name="username"
                        placeholder="Enter your username" required autocomplete="username" />
                </div>
            </div>

            <div class="mb-4">
                <label for="password" class="form-label">Password</label>
                <div class="input-group">
                    <span class="input-group-text"
                        style="background:rgba(255,255,255,0.05);border-color:rgba(255,255,255,0.08);color:#94a3b8;">
                        <i class="bi bi-lock"></i>
                    </span>
                    <input type="password" class="form-control" id="password" name="password"
                        placeholder="Enter your password" required autocomplete="current-password" />
                </div>
            </div>

            <button type="submit" class="btn btn-success w-100 btn-lg" id="student-login-submit">
                <i class="bi bi-box-arrow-in-right me-2"></i>Login as Student
            </button>
        </form>

        <hr class="section-divider" />
        <div class="text-center">
            <p class="text-muted mb-2" style="font-size:0.88rem;">
                New student? <a href="{{ url_for('student_register') }}" class="text-primary">Register here</a>
            </p>
            <p class="text-muted mb-0" style="font-size:0.88rem;">
                Are you a teacher? <a href="{{ url_for('teacher_login') }}" class="text-primary">Teacher Login</a>
            </p>
        </div>

    </div>
</div>
{% endblock %}
