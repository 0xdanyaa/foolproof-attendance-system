{% extends "base.html" %}
{% block title %}Teacher Login{% endblock %}

{% block content %}
<div class="login-wrapper">
    <div class="login-card fade-in">

        <!-- Icon -->
        <div class="login-logo">👨‍🏫</div>

        <h1 class="login-title">Teacher Login</h1>
        <p class="login-subtitle">Access your attendance management dashboard</p>

        <!-- Login Form -->
        <!-- The form POSTs data to the same route, which Flask processes -->
        <form method="POST" action="{{ url_for('teacher_login') }}" id="teacher-login-form">

            <!-- Username field -->
            <div class="mb-3">
                <label for="username" class="form-label">Username</label>
                <div class="input-group">
                    <span class="input-group-text"
                        style="background:rgba(255,255,255,0.05);border-color:rgba(255,255,255,0.08);color:#94a3b8;">
                        <i class="bi bi-person"></i>
                    </span>
                    <input type="text" class="form-control" id="username" name="username"
                        placeholder="Enter your username" required autocomplete="username" />
                </div>
            </div>

            <!-- Password field -->
            <div class="mb-4">
                <label for="password" class="form-label">Password</label>
                <div class="input-group">
                    <span class="input-group-text"
                        style="background:rgba(255,255,255,0.05);border-color:rgba(255,255,255,0.08);color:#94a3b8;">
                        <i class="bi bi-lock"></i>
                    </span>
                    <input type="password" class="form-control" id="password" name="password"
                        placeholder="Enter your password" required autocomplete="current-password" />
                </div>
            </div>

            <!-- Submit button -->
            <button type="submit" class="btn btn-primary w-100 btn-lg" id="teacher-login-submit">
                <i class="bi bi-box-arrow-in-right me-2"></i>Login as Teacher
            </button>
        </form>

        <hr class="section-divider" />

        <!-- Links to other pages -->
        <div class="text-center">
            <p class="text-muted mb-2" style="font-size:0.88rem;">
                New teacher? <a href="{{ url_for('teacher_register') }}" class="text-primary">Create an account</a>
            </p>
            <p class="text-muted mb-0" style="font-size:0.88rem;">
                Are you a student? <a href="{{ url_for('student_login') }}" class="text-primary">Student Login</a>
            </p>
        </div>

    </div>
</div>
{% endblock %}
